<!DOCTYPE html>
<html>

<head>
    <title>Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .card-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        .status-available {
            color: green;
            font-weight: bold;
        }

        .status-issued {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card-box">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>📚 Books List</h2>

            <a href="/add_book" class="btn btn-success">
                Add Book
            </a>

        </div>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

            {% for book in books %}

                <tr>

                    <td>{{ book.id }}</td>

                    <td>{{ book.title }}</td>

                    <td>{{ book.author }}</td>

                    <td>

                        {% if book.available %}

                            <span class="status-available">
                                Available
                            </span>

                        {% else %}

                            <span class="status-issued">
                                Issued
                            </span>

                        {% endif %}

                    </td>

                    <td>

                        <a href="/delete_book/{{ book.id }}"
                           class="btn btn-danger btn-sm">

                            Delete

                        </a>

                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

        {% if books|length == 0 %}

        <div class="alert alert-warning">
            No books available.
        </div>

        {% endif %}

        <a href="/" class="btn btn-primary mt-3">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
